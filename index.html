<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio Pro - Dark & Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --carbono: #121212;
            --dorado: #D4AF37;
            --dorado-brillo: #F1D592;
            --blanco-suave: #E0E0E0;
            --gris-oscuro: #1e1e1e;
        }

        /* Estilos Globales */
        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--carbono);
            color: var(--blanco-suave);
            line-height: 1.6;
        }

        /* Sección Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, #1a1a1a 0%, var(--carbono) 100%);
        }

        .hero h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem); /* Tamaño fluido */
            margin-bottom: 10px;
            color: var(--dorado);
            background: linear-gradient(to right, var(--dorado), var(--dorado-brillo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: clamp(1rem, 4vw, 1.2rem);
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .cta-button {
            padding: 15px 40px;
            border: 2px solid var(--dorado);
            color: var(--dorado);
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .cta-button:hover {
            background-color: var(--dorado);
            color: var(--carbono);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        /* Sección de Proyectos (Grid) */
        .portfolio-section {
            padding: 80px 10%;
        }

        .portfolio-section h2 {
            text-align: center;
            color: var(--dorado);
            margin-bottom: 50px;
            font-size: 2rem;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .project-card {
            background: var(--gris-oscuro);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #333;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--dorado);
        }

        .project-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, #222, #333);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-weight: bold;
        }

        .project-info {
            padding: 20px;
        }

        .project-info h3 {
            margin: 0;
            color: var(--dorado);
            font-size: 1.3rem;
        }

        .project-info span {
            font-size: 0.8rem;
            color: #888;
        }

        /* Sección de Contacto */
        .contact-section {
            text-align: center;
            padding: 100px 20px;
            background: linear-gradient(to bottom, var(--carbono), #000);
        }

        .contact-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .btn-contact {
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid;
            transition: 0.3s;
        }

        .whatsapp { color: #25D366; border-color: #25D366; }
        .linkedin { color: #0077B5; border-color: #0077B5; }

        .btn-contact:hover { transform: scale(1.05); background: rgba(255,255,255,0.05); }

        footer {
            margin-top: 60px;
            padding: 20px;
            font-size: 0.8rem;
            color: #555;
            border-top: 1px solid #222;
        }

        /* Ajustes para Celulares (Media Queries) */
        @media (max-width: 768px) {
            .hero h1 { line-height: 1.1; }
            .portfolio-section { padding: 50px 5%; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>TU NOMBRE AQUÍ</h1>
        <p>Creativo Digital & Desarrollador</p>
        <a href="#proyectos" class="cta-button">Ver Proyectos</a>
    </section>

    <section id="proyectos" class="portfolio-section">
        <h2>Proyectos Destacados</h2>
        <div class="portfolio-grid">
            <div class="project-card">
                <div class="project-image">IMAGEN</div>
                <div class="project-info">
                    <h3>Proyecto Alpha</h3>
                    <span>Diseño UI/UX</span>
                </div>
            </div>
            <div class="project-card">
                <div class="project-image">IMAGEN</div>
                <div class="project-info">
                    <h3>Proyecto Beta</h3>
                    <span>Desarrollo Web</span>
                </div>
            </div>
            <div class="project-card">
                <div class="project-image">IMAGEN</div>
                <div class="project-info">
                    <h3>Proyecto Gamma</h3>
                    <span>Branding Premium</span>
                </div>
            </div>
        </div>
    </section>

    <section class="contact-section">
        <h2>¿Trabajamos juntos?</h2>
        <div class="contact-buttons">
            <a href="#" class="btn-contact whatsapp">WhatsApp</a>
            <a href="#" class="btn-contact linkedin">LinkedIn</a>
        </div>
        <footer>
            <p>&copy; 2026 Tu Nombre. Hecho con estilo.</p>
        </footer>
    </section>

</body>
</html>
